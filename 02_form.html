<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>회원가입 양식</h1>
    <form action="" method="get">
      <label for="username"
        >유저이름 : <input name="username" id="username"
      /></label>
      <br />

      <label for="password"
        >패스워드 :
        <input
          name="password"
          id="password"
          type="password"
          placeholder="비밀번호를 입력해주세요"
      /></label>
      <br />

      <textarea name="long_text"></textarea>
      <br />
      <input type="radio" name="gender" />남성
      <input type="radio" name="gender" />여성
      <br />
      <select name="city">
        <option>서울</option>
        <option>부산</option>
        <option>제주</option>
      </select>
      <br />
      <input type="checkbox" name="hobby" value="1" /> 취미1
      <input type="checkbox" name="hobby" value="2" /> 취미2
      <br />
      <input type="color" />
      <input type="date" />
      <br />

      <button type="submit">제출</button>
    </form>
  </body>
</html>
